services:
  vscode:
    build: .
    depends_on:
      mongo:
        condition: service_healthy
    cap_add:
      # For debugging with dlv
      - SYS_PTRACE
    security_opt:
      # For debugging with dlv
      - seccomp:unconfined

  mongo:
    image: mongo:7
    container_name: 'southclaws-cj-mongo-${MONGO_CONTAINER_ID:-local}'
    hostname: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-dev}
    ports:
      - "${MONGO_EXPOSED_PORT:-27017}:27017"
    volumes:
      - ./data/db:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s